<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>OakilyDokily Mural</title>
  <style>
    html, body { margin: 0; padding: 0; min-height: 100%; background: #1a1a2e; display: flex; justify-content: center; align-items: center; }
    .mural-wrap { width: min(1024px, 100vw); aspect-ratio: 1024/558; margin: auto; }
    canvas { display: block; width: 100%; height: 100%; }
  </style>
</head>
<body>
  <div class="mural-wrap">
    <canvas id="glcanvas" tabindex="1"></canvas>
  </div>
  <script src="gl.js"></script>
  <script>
    // JS/Rust bridge: pass scrollY and mouse_pos into WASM
    miniquad_add_plugin({
      on_init: function() {
        setInterval(function() {
          if (wasm_exports) {
            if (wasm_exports.mural_set_scroll_x) wasm_exports.mural_set_scroll_x(window.scrollX);
            if (wasm_exports.mural_set_scroll_y) wasm_exports.mural_set_scroll_y(window.scrollY);
          }
        }, 50);
        var canvas = document.getElementById('glcanvas');
        if (canvas && wasm_exports && wasm_exports.mural_set_mouse) {
          canvas.addEventListener('mousemove', function(e) {
            var rect = canvas.getBoundingClientRect();
            var x = (e.clientX - rect.left) * (canvas.width / rect.width);
            var y = (e.clientY - rect.top) * (canvas.height / rect.height);
            wasm_exports.mural_set_mouse(x, y);
          });
        }
      }
    });
  </script>
  <script>load("mural-wasm.wasm");</script>
</body>
</html>
