<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 120" width="160" height="120">
  <!-- 8-bit left island - blocky, tropical -->
  <defs>
    <linearGradient id="sand" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#8B7355"/>
      <stop offset="0.5" stop-color="#A08060"/>
      <stop offset="1" stop-color="#C4A574"/>
    </linearGradient>
    <linearGradient id="grass-top" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#2a6a2a"/>
      <stop offset="1" stop-color="#4a8a4a"/>
    </linearGradient>
    <linearGradient id="palm" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#5a4a2a"/>
      <stop offset="1" stop-color="#7a6a4a"/>
    </linearGradient>
  </defs>
  <!-- Water -->
  <rect x="0" y="0" width="160" height="120" fill="#1a3a5a"/>
  <!-- Island base - 8-bit blocks -->
  <rect x="0" y="70" width="24" height="50" fill="url(#sand)"/>
  <rect x="24" y="60" width="24" height="60" fill="url(#sand)"/>
  <rect x="48" y="50" width="24" height="70" fill="url(#sand)"/>
  <rect x="72" y="55" width="24" height="65" fill="url(#sand)"/>
  <rect x="96" y="65" width="24" height="55" fill="url(#sand)"/>
  <rect x="120" y="75" width="24" height="45" fill="url(#sand)"/>
  <rect x="144" y="85" width="16" height="35" fill="url(#sand)"/>
  <!-- Grass layer on top -->
  <rect x="24" y="55" width="24" height="8" fill="url(#grass-top)"/>
  <rect x="48" y="45" width="24" height="8" fill="url(#grass-top)"/>
  <rect x="72" y="50" width="24" height="8" fill="url(#grass-top)"/>
  <rect x="96" y="60" width="24" height="8" fill="url(#grass-top)"/>
  <!-- Palm tree -->
  <rect x="55" y="35" width="8" height="25" fill="url(#palm)"/>
  <rect x="52" y="25" width="6" height="6" fill="#2a6a2a"/>
  <rect x="58" y="23" width="6" height="6" fill="#2a6a2a"/>
  <rect x="54" y="28" width="6" height="6" fill="#2a6a2a"/>
</svg>
