<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <style>
      /* Dog: tail wag (happy), subtle ear perk. 8-bit: 100-150ms per frame feel */
      .dog-tail { transform-origin: 22px 22px; animation: dog-wag 0.8s ease-in-out infinite; }
      .dog-ear-l { transform-origin: 5px 12px; animation: dog-ear 1.2s ease-in-out infinite; }
      .dog-ear-r { transform-origin: 27px 12px; animation: dog-ear 1.2s ease-in-out 0.2s infinite; }
      @keyframes dog-wag {
        0%, 100% { transform: rotate(-15deg); }
        50% { transform: rotate(15deg); }
      }
      @keyframes dog-ear {
        0%, 100% { transform: rotate(0deg); }
        50% { transform: rotate(-5deg); }
      }
    </style>
  </defs>
  <!-- 8-bit golden retriever  tail wag, ears -->
  <rect width="32" height="32" fill="transparent"/>
  <rect class="dog-ear-l" x="2" y="10" width="6" height="12" fill="#C4956A"/>
  <rect class="dog-ear-r" x="24" y="10" width="6" height="12" fill="#C4956A"/>
  <rect x="6" y="8" width="20" height="16" fill="#D4A574"/>
  <rect x="10" y="18" width="12" height="8" fill="#E8C4A0"/>
  <rect x="10" y="12" width="4" height="4" fill="#1a1a1a"/>
  <rect x="18" y="12" width="4" height="4" fill="#1a1a1a"/>
  <rect x="11" y="13" width="2" height="2" fill="#fff"/>
  <rect x="19" y="13" width="2" height="2" fill="#fff"/>
  <rect x="14" y="20" width="4" height="4" fill="#2a2a2a"/>
  <rect x="8" y="24" width="16" height="8" fill="#D4A574"/>
  <rect x="8" y="30" width="5" height="2" fill="#C4956A"/>
  <rect x="19" y="30" width="5" height="2" fill="#C4956A"/>
  <g class="dog-tail">
    <rect x="22" y="22" width="4" height="6" fill="#C4956A"/>
  </g>
</svg>
