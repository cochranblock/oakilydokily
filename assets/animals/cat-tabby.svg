<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- 8-bit tabby cat - natural brown/orange stripes -->
  <rect width="32" height="32" fill="transparent"/>
  <!-- ears -->
  <rect x="4" y="2" width="6" height="8" fill="#8B6914"/>
  <rect x="22" y="2" width="6" height="8" fill="#8B6914"/>
  <!-- head -->
  <rect x="6" y="8" width="20" height="14" fill="#D4A84A"/>
  <!-- stripes -->
  <rect x="10" y="10" width="2" height="4" fill="#8B6914"/>
  <rect x="16" y="9" width="2" height="6" fill="#8B6914"/>
  <rect x="20" y="11" width="2" height="4" fill="#8B6914"/>
  <!-- eyes -->
  <rect x="10" y="12" width="4" height="4" fill="#1a1a1a"/>
  <rect x="18" y="12" width="4" height="4" fill="#1a1a1a"/>
  <rect x="11" y="13" width="2" height="2" fill="#fff"/>
  <rect x="19" y="13" width="2" height="2" fill="#fff"/>
  <!-- nose -->
  <rect x="15" y="16" width="2" height="2" fill="#e88777"/>
  <!-- whiskers -->
  <line x1="6" y1="15" x2="2" y2="14" stroke="#8B6914" stroke-width="1"/>
  <line x1="6" y1="17" x2="2" y2="17" stroke="#8B6914" stroke-width="1"/>
  <line x1="26" y1="15" x2="30" y2="14" stroke="#8B6914" stroke-width="1"/>
  <line x1="26" y1="17" x2="30" y2="17" stroke="#8B6914" stroke-width="1"/>
  <!-- body -->
  <rect x="8" y="20" width="16" height="10" fill="#D4A84A"/>
  <rect x="12" y="22" width="2" height="4" fill="#8B6914"/>
  <rect x="18" y="22" width="2" height="4" fill="#8B6914"/>
  <!-- legs -->
  <rect x="8" y="28" width="4" height="4" fill="#D4A84A"/>
  <rect x="20" y="28" width="4" height="4" fill="#D4A84A"/>
</svg>
