<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <style>
      /* Cat loaf: subtle breathing (scale), blink every ~3s. 8-bit timing: 300-500ms holds */
      .cat-body { transform-origin: 16px 20px; animation: cat-breathe 2.5s ease-in-out infinite; }
      .cat-eye { animation: cat-blink 4s ease-in-out infinite; }
      .cat-whisker { transform-origin: 6px 16px; animation: cat-whisker 2s ease-in-out infinite; }
      .cat-whisker-r { transform-origin: 26px 16px; animation: cat-whisker-r 2s ease-in-out 0.3s infinite; }
      @keyframes cat-breathe {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.03); }
      }
      @keyframes cat-blink {
        0%, 45%, 55%, 100% { opacity: 1; }
        50% { opacity: 0.1; }
      }
      @keyframes cat-whisker {
        0%, 100% { transform: rotate(0deg); }
        50% { transform: rotate(3deg); }
      }
      @keyframes cat-whisker-r {
        0%, 100% { transform: rotate(0deg); }
        50% { transform: rotate(-3deg); }
      }
    </style>
  </defs>
  <!-- 8-bit ginger cat  loafing, breathing, whisker twitch -->
  <rect width="32" height="32" fill="transparent"/>
  <g class="cat-body">
    <rect x="4" y="2" width="6" height="8" fill="#B85C1A"/>
    <rect x="22" y="2" width="6" height="8" fill="#B85C1A"/>
    <rect x="6" y="8" width="20" height="14" fill="#E87B2E"/>
    <rect class="cat-eye" x="10" y="12" width="4" height="4" fill="#1a1a1a"/>
    <rect class="cat-eye" x="18" y="12" width="4" height="4" fill="#1a1a1a"/>
    <rect x="11" y="13" width="2" height="2" fill="#fff"/>
    <rect x="19" y="13" width="2" height="2" fill="#fff"/>
    <rect x="15" y="16" width="2" height="2" fill="#cc4455"/>
    <g class="cat-whisker">
      <line x1="6" y1="15" x2="2" y2="14" stroke="#B85C1A" stroke-width="1"/>
      <line x1="6" y1="17" x2="2" y2="17" stroke="#B85C1A" stroke-width="1"/>
    </g>
    <g class="cat-whisker-r">
      <line x1="26" y1="15" x2="30" y2="14" stroke="#B85C1A" stroke-width="1"/>
      <line x1="26" y1="17" x2="30" y2="17" stroke="#B85C1A" stroke-width="1"/>
    </g>
    <rect x="8" y="20" width="16" height="10" fill="#E87B2E"/>
    <rect x="8" y="28" width="4" height="4" fill="#E87B2E"/>
    <rect x="20" y="28" width="4" height="4" fill="#E87B2E"/>
  </g>
</svg>
