<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <style>
      .cat-body { transform-origin: 16px 20px; animation: cat-breathe 2.8s ease-in-out infinite; }
      .cat-eye { animation: cat-blink 4.5s ease-in-out infinite; }
      .cat-whisker { transform-origin: 6px 16px; animation: cat-whisker 2.2s ease-in-out infinite; }
      .cat-whisker-r { transform-origin: 26px 16px; animation: cat-whisker-r 2.2s ease-in-out 0.4s infinite; }
      @keyframes cat-breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.02); } }
      @keyframes cat-blink { 0%, 48%, 52%, 100% { opacity: 1; } 50% { opacity: 0.1; } }
      @keyframes cat-whisker { 0%, 100% { transform: rotate(0deg); } 50% { transform: rotate(2deg); } }
      @keyframes cat-whisker-r { 0%, 100% { transform: rotate(0deg); } 50% { transform: rotate(-2deg); } }
    </style>
  </defs>
  <rect width="32" height="32" fill="transparent"/>
  <g class="cat-body">
    <rect x="4" y="2" width="6" height="8" fill="#1a1a1a"/>
    <rect x="22" y="2" width="6" height="8" fill="#1a1a1a"/>
    <rect x="6" y="8" width="20" height="14" fill="#f5f5f5"/>
    <rect x="6" y="8" width="10" height="6" fill="#1a1a1a"/>
    <rect class="cat-eye" x="10" y="12" width="4" height="4" fill="#1a1a1a"/>
    <rect class="cat-eye" x="18" y="12" width="4" height="4" fill="#1a1a1a"/>
    <rect x="11" y="13" width="2" height="2" fill="#fff"/>
    <rect x="19" y="13" width="2" height="2" fill="#fff"/>
    <rect x="15" y="16" width="2" height="2" fill="#e88777"/>
    <g class="cat-whisker">
      <line x1="6" y1="15" x2="2" y2="14" stroke="#1a1a1a" stroke-width="1"/>
      <line x1="6" y1="17" x2="2" y2="17" stroke="#1a1a1a" stroke-width="1"/>
    </g>
    <g class="cat-whisker-r">
      <line x1="26" y1="15" x2="30" y2="14" stroke="#1a1a1a" stroke-width="1"/>
      <line x1="26" y1="17" x2="30" y2="17" stroke="#1a1a1a" stroke-width="1"/>
    </g>
    <rect x="8" y="20" width="16" height="10" fill="#1a1a1a"/>
    <rect x="12" y="22" width="8" height="6" fill="#f5f5f5"/>
    <rect x="8" y="28" width="4" height="4" fill="#f5f5f5"/>
    <rect x="20" y="28" width="4" height="4" fill="#1a1a1a"/>
  </g>
</svg>
