<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <style>
      .dog-tail { transform-origin: 22px 22px; animation: dog-wag 0.9s ease-in-out infinite; }
      .dog-ear-l { transform-origin: 5px 12px; animation: dog-ear 1.4s ease-in-out infinite; }
      .dog-ear-r { transform-origin: 27px 12px; animation: dog-ear 1.4s ease-in-out 0.3s infinite; }
      @keyframes dog-wag { 0%, 100% { transform: rotate(-12deg); } 50% { transform: rotate(12deg); } }
      @keyframes dog-ear { 0%, 100% { transform: rotate(0deg); } 50% { transform: rotate(-4deg); } }
    </style>
  </defs>
  <rect width="32" height="32" fill="transparent"/>
  <rect class="dog-ear-l" x="2" y="10" width="6" height="12" fill="#2a2a2a"/>
  <rect class="dog-ear-r" x="24" y="10" width="6" height="12" fill="#2a2a2a"/>
  <rect x="6" y="8" width="20" height="16" fill="#3a3a3a"/>
  <rect x="10" y="18" width="12" height="8" fill="#2a2a2a"/>
  <rect x="10" y="12" width="4" height="4" fill="#1a1a1a"/>
  <rect x="18" y="12" width="4" height="4" fill="#1a1a1a"/>
  <rect x="11" y="13" width="2" height="2" fill="#fff"/>
  <rect x="19" y="13" width="2" height="2" fill="#fff"/>
  <rect x="14" y="20" width="4" height="4" fill="#1a1a1a"/>
  <rect x="8" y="24" width="16" height="8" fill="#3a3a3a"/>
  <rect x="8" y="30" width="5" height="2" fill="#2a2a2a"/>
  <rect x="19" y="30" width="5" height="2" fill="#2a2a2a"/>
  <g class="dog-tail">
    <rect x="22" y="22" width="4" height="6" fill="#2a2a2a"/>
  </g>
</svg>
