<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Mural Test</title>
  <style>
    html, body, canvas { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
    canvas { display: block; background: #e8eef2; }
  </style>
</head>
<body>
  <canvas id="glcanvas" tabindex="1" width="1024" height="558"></canvas>
  <script>
    window.onerror = function(msg, url, line, col, err) {
      console.error("GLOBAL ERROR:", msg, "at", url + ":" + line + ":" + col, err);
      return false;
    };
    console.log("mural-test: canvas exists?", !!document.getElementById("glcanvas"));
  </script>
  <script src="/assets/gl.js"></script>
  <script src="/assets/mural-bridge.js"></script>
  <script>
    console.log("mural-test: load defined?", typeof load);
    if (typeof load === "function") {
      load("/assets/mural-wasm.wasm");
    } else {
      console.error("mural-test: load() not found - gl.js may have failed");
    }
  </script>
</body>
</html>
